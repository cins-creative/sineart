name = "sine-art-api"
main = "index.mjs"
compatibility_date = "2024-09-01"

# Messenger Agent — BẮT BUỘC: binding tên "KV" (session: + agent_ctx).
# Nếu thiếu hoặc id sai → runtime không có env.KV → log "Messenger: missing KV binding".
# Tạo namespace: wrangler kv namespace create SINE_ART_AGENT_KV --remote
# Rồi chèn id UUID vào dòng id = bên dưới và deploy lại (hoặc gán KV tên "KV" trong Dashboard → Settings → Bindings).
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "sineart-images"

[[kv_namespaces]]
binding = "CACHE"
id = "4be0d0e78d6243c08c30c1d7df7f8d95"