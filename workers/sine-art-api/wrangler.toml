name = "sine-art-api"
main = "index.mjs"
compatibility_date = "2024-09-01"

# Messenger Agent: session:* + agent_ctx — tạo KV mới trên Cloudflare hoặc dùng namespace cũ của Worker Meta; bắt buộc có binding tên "KV".
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "sineart-images"

[[kv_namespaces]]
binding = "CACHE"
id = "4be0d0e78d6243c08c30c1d7df7f8d95"